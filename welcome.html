<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to the Platform</title>
  <style>
    body { margin: 0; padding: 0; background-color: #ffffff; }
    table { border-collapse: collapse; }
    @media screen and (max-width: 600px) { .container { width: 100% !important; } }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #ffffff;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td align="center" style="padding: 40px 10px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width: 600px; background-color: #f9faff; border-radius: 8px;" class="container">
          <tr>
            <td align="center" style="padding: 40px 30px;">
              <img src="https://via.placeholder.com/100x100/4a90e2/ffffff?text=W" alt="Logo" width="80" style="display: block; margin-bottom: 20px;">
              <h1 style="margin: 0 0 20px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; color: #1a1a1a;">Welcome Aboard, {{First_Name}}!</h1>
              <p style="margin: 0 0 30px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 16px; color: #4a4a4a; line-height: 1.6;">
                We are thrilled to have you. Your account is ready to go. The next step is to set up your profile and launch your first campaign to start seeing results immediately.
              </p>
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="background-color: #4a90e2; border-radius: 4px;">
                    <a href="#" style="background-color: #4a90e2; color: #ffffff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 16px; font-weight: bold; text-decoration: none; padding: 15px 35px; display: inline-block; border-radius: 4px;">Complete Setup</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
        </td>
    </tr>
  </table>
</body>
</html>
