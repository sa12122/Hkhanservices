<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Promo</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f4f4f4; }
    table { border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    @media screen and (max-width: 600px) {
      .container { width: 100% !important; }
      .product-column { display: block !important; width: 100% !important; padding-bottom: 20px !important; }
      .hero-img { width: 100% !important; height: auto !important; }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f4;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f4f4f4;">
    <tr>
      <td align="center" style="padding: 20px 10px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width: 600px; background-color: #ffffff;" class="container">
          <tr>
            <td>
              <img src="https://res.cloudinary.com/dxgrfhuho/image/upload/q_auto/f_auto/v1778217633/leads13_jqr01w.jpg" alt="Summer Sale" class="hero-img" width="600" style="display: block; width: 100%; max-width: 600px;">
            </td>
          </tr>
          <tr>
            <td align="center" style="padding: 30px 20px; font-family: Arial, sans-serif;">
              <h1 style="margin:0 0 10px; font-size: 24px; color: #333333;">Up to 50% Off Top Gear</h1>
              <p style="margin:0; font-size: 16px; color: #666666;">Shop our best-selling items before they sell out.</p>

                    <h3 style="margin: 15px 0 5px; font-family: Arial, sans-serif; font-size: 16px; color: #333;">Running Shoe X</h3>
                    <p style="margin: 0 0 15px; font-family: Arial, sans-serif; font-size: 14px; color: #e63946;"><b>$89.99</b> <s style="color:#999;">$120.00</s></p>
                    <table cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="background-color: #111111; padding: 10px 20px; border-radius: 3px;">
                          <a href="#" style="color: #ffffff; font-family: Arial, sans-serif; text-decoration: none; font-weight: bold;">Shop Now</a>
                        </td>
                      </tr>
                    </table>
                  </td>
                  <td width="4%" class="product-column" style="font-size:1px; line-height:1px;">&nbsp;</td>
                  <td width="48%" class="product-column" align="center" valign="top">
                    <img src="https://res.cloudinary.com/dxgrfhuho/image/upload/q_auto/f_auto/v1778204390/samples/ecommerce/leather-bag-gray.jpg" alt="Product B" width="260" style="display: block; max-width: 100%;">
                    <h3 style="margin: 15px 0 5px; font-family: Arial, sans-serif; font-size: 16px; color: #333;">Training Bag</h3>
                    <p style="margin: 0 0 15px; font-family: Arial, sans-serif; font-size: 14px; color: #e63946;"><b>$45.00</b> <s style="color:#999;">$60.00</s></p>
                    <table cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="background-color: #111111; padding: 10px 20px; border-radius: 3px;">
                          <a href="#" style="color: #ffffff; font-family: Arial, sans-serif; text-decoration: none; font-weight: bold;">Shop Now</a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
        </td>
    </tr>
  </table>
</body>
</html>
