<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Receipt</title>
  <style>
    body { margin: 0; padding: 0; background-color: #eceff1; }
    table { border-collapse: collapse; }
    @media screen and (max-width: 600px) {
      .container { width: 100% !important; }
      .mobile-pad { padding: 20px 15px !important; }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #eceff1;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #eceff1;">
    <tr>
      <td align="center" style="padding: 40px 10px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width: 600px; background-color: #ffffff; border: 1px solid #cfd8dc;" class="container">
          <tr>
            <td align="center" style="padding: 30px; background-color: #263238; color: #ffffff; font-family: Arial, sans-serif;">
              <h2 style="margin:0; font-size: 24px;">Order Confirmed</h2>
              <p style="margin:10px 0 0; font-size: 14px; color: #b0bec5;">Order #987654321</p>
            </td>
          </tr>
          <tr>
            <td class="mobile-pad" style="padding: 30px;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="font-family: Arial, sans-serif; font-size: 14px; color: #333333;">
                <tr>
                  <th align="left" style="padding-bottom: 10px; border-bottom: 2px solid #eceff1;">Item</th>
                  <th align="center" style="padding-bottom: 10px; border-bottom: 2px solid #eceff1;">Qty</th>
                  <th align="right" style="padding-bottom: 10px; border-bottom: 2px solid #eceff1;">Price</th>
                </tr>
                <tr>
                  <td align="left" style="padding: 15px 0; border-bottom: 1px solid #eceff1;">Pro Marketing Tier - Monthly</td>
                  <td align="center" style="padding: 15px 0; border-bottom: 1px solid #eceff1;">1</td>
                  <td align="right" style="padding: 15px 0; border-bottom: 1px solid #eceff1;">$99.00</td>
                </tr>
                <tr>
                  <td align="left" style="padding: 15px 0; border-bottom: 1px solid #eceff1;">Ad Spend Credits</td>
                  <td align="center" style="padding: 15px 0; border-bottom: 1px solid #eceff1;">5</td>
                  <td align="right" style="padding: 15px 0; border-bottom: 1px solid #eceff1;">$50.00</td>
                </tr>
                <tr>
                  <td colspan="2" align="right" style="padding: 15px 0 5px; font-weight: bold;">Subtotal:</td>
                  <td align="right" style="padding: 15px 0 5px;">$149.00</td>
                </tr>
                <tr>
                  <td colspan="2" align="right" style="padding: 5px 0; font-weight: bold;">Tax:</td>
                  <td align="right" style="padding: 5px 0;">$11.92</td>
                </tr>
                <tr>
                  <td colspan="2" align="right" style="padding: 15px 0; font-weight: bold; font-size: 18px; color: #000000; border-top: 2px solid #333333;">Total:</td>
                  <td align="right" style="padding: 15px 0; font-weight: bold; font-size: 18px; color: #000000; border-top: 2px solid #333333;">$160.92</td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
        </td>
    </tr>
  </table>
</body>
</html>
